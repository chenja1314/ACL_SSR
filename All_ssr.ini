custom_proxy_group=🇯🇵 日本节点`url-test`(?=.*(🇯🇵|🇯🇵|樱花|北海道|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 加坡节点`url-test`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(家宽|游戏|剩余|流量|2.0|2倍|2x|3.0|3倍|3x|4.0|4倍|4x)).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|USA|United States))^`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(?=.*(🇰🇷|KR|🇰🇷|韩国|韩国欧巴))^`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(?=.*(🇹🇼|TW|台湾|台北))^`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌐 其他地区`select`(^(?!.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore)).*)
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;select：选择模式，后加分组或者节点
;url-test：自动测速模式,选择速度最快的节点，后加节点
;fallback:故障转移，后加节点
;load-balance，后加节点

;启用自定义规则集

enable_rule_generator=true
overwrite_original_rules=true

